<!DOCTYPE html>
<html>
<head>

<title>Roblox Admin Panel</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
text-align:center;
}

input,button{
padding:10px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #555;
padding:8px;
text-align:center;
}

th{
background:#333;
}

</style>

</head>


<body>


<h1>
Roblox Player Log
</h1>


<input id="search" placeholder="Cari username">


<button onclick="loadData()">
Refresh
</button>


<table>

<thead>

<tr>

<th>ID</th>
<th>Display Name</th>
<th>Username</th>
<th>User ID</th>
<th>Join Time</th>
<th>Leave Time</th>

</tr>

</thead>


<tbody id="data">

</tbody>


</table>



<script>


const URL =
"https://ygwkmanjkiuachkmhkbh.supabase.co";


const KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlnd2ttYW5qa2l1YWNoa21oa2JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjgxNDIsImV4cCI6MjA5OTU0NDE0Mn0.bE15mcFyl6ZDRXc8Xpu_oh5Aetd_CmAdLNm8qUryQhw";



async function loadData(){


let result =
await fetch(

URL+
"/rest/v1/player_logs?select=*&order=id.desc",

{

headers:{

apikey:KEY,

Authorization:
"Bearer "+KEY

}

}

);



let players =
await result.json();



let search =
document
.getElementById("search")
.value
.toLowerCase();



let html="";



players.forEach(p=>{


if(
p.username
.toLowerCase()
.includes(search)
){


html+=`

<tr>

<td>${p.id}</td>

<td>${p.displayname}</td>

<td>${p.username}</td>

<td>${p.userid}</td>

<td>${p.join_time}</td>

<td>${p.leave_time ?? "Online"}</td>

</tr>

`;


}


});



document.getElementById("data").innerHTML=html;


}


loadData();


</script>


</body>
</html>
